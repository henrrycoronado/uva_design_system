name: uva_design_system
description: "UVA Design System - shared Flutter UI components, models and theme."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.2.0
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.0
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  go_router: ^17.3.0
  permission_handler: ^12.0.3
  flutter_localizations:
    sdk: flutter
  share_plus: ^13.1.0
  widgetbook: ^3.24.0
  widgetbook_annotation: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
